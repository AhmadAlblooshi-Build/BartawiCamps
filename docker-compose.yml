version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bartawi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bartawi
      POSTGRES_PASSWORD: bartawi_dev_password
      POSTGRES_DB: bartawi_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount current schema for initial setup
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      # Note: Use Prisma migrations & seed scripts for data:
      #   cd server && npx prisma migrate deploy && npx prisma db seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bartawi -d bartawi_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
